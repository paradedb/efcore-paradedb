version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "nuget"
    directories:
      - "/src"
      - "/tests"
      - "/examples"
    schedule:
      interval: "monthly"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-patch"]
    groups:
      nuget-dependencies:
        patterns:
          - "*"
