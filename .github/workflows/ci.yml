# workflows/ci.yml
#
# CI
# Run linting and test matrix across supported .NET versions.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: CSharpier format check
        run: dotnet csharpier check .

      - name: Restore
        run: dotnet restore build.slnf

      - name: Verify build (no warnings)
        run: dotnet build build.slnf --configuration Release --no-restore -warnaserror

  build:
    name: .NET ${{ matrix.framework }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - dotnet: "8.0.x"
            framework: "net8.0"
          - dotnet: "9.0.x"
            framework: "net9.0"
          - dotnet: "10.0.x"
            framework: "net10.0"

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore build.slnf

      - name: Build
        run: dotnet build build.slnf --configuration Release --framework ${{ matrix.framework }} --no-restore

      - name: Test unit
        run: |
          dotnet test --project tests/ParadeDB.EntityFrameworkCore.Tests/ParadeDB.EntityFrameworkCore.Tests.csproj \
            --no-build \
            --configuration Release \
            --framework ${{ matrix.framework }} \
            --results-directory TestResults/${{ matrix.framework }}/unit \
            --coverlet \
            --coverlet-output-format cobertura

      - name: Test integration
        run: |
          dotnet test --project tests/ParadeDB.EntityFrameworkCore.IntegrationTests/ParadeDB.EntityFrameworkCore.IntegrationTests.csproj \
            --no-build \
            --configuration Release \
            --framework ${{ matrix.framework }} \
            --results-directory TestResults/${{ matrix.framework }}/integration \
            --coverlet \
            --coverlet-output-format cobertura

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          directory: TestResults/${{ matrix.framework }}
          flags: ${{ matrix.framework }}
          fail_ci_if_error: false
          verbose: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
